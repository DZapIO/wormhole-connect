name: Test
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run the tests against"
        required: false
        default: "http://localhost:5173"

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: ci
    permissions: read-all
    defaults:
      run:
        working-directory: "./wormhole-connect"
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble
      options: --user 1001 # Default user ID in Ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "wormhole-connect/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          REACT_APP_TEST_EVM_ADDR: ${{ secrets.REACT_APP_TEST_EVM_ADDR }}
          REACT_APP_TEST_EVM_PK: ${{ secrets.REACT_APP_TEST_EVM_PK }}
          REACT_APP_TEST_CG_AK: ${{ secrets.REACT_APP_TEST_CG_AK }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: wormhole-connect/playwright-report/
          retention-days: 30
